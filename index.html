KEY MEASUREMENTS & CORRECTIONS:

FIX #1: Pool bottom to bottom fence = 2m (inside paved zone = end of property).

  Oak strip left edge x = 320 (from v5).

  No: oak is independent of house. Oak left = 746 - 426 = 320. 
  Gate is centred between fence_left (x=54) and oak_left (x=320).
  Centre = (54+320)/2 = 187. Gate 6m=168px wide: gate_left=187-84=103, gate_right=187+84=271.
  Gate in TOP fence (y=72).

LAYOUT:
  Scale: 1m = 28px
  Canvas: 800 × 980
  
  Fence left inner:  x = 54
  Fence right inner: x = 746  (right fence x=736, inner=746? let's use inner=746)

  house_left  = 54 + 70 = 124   (2.5m left gap = 70px)
  house_right = 124 + 426 = 550
  house_top   = 82 + 280 = 362  (10m from road = 280px)
  house_bottom= 362 + 266 = 628

  Side porch width = 2.8m = 78px → porch_right = 550 + 78 = 628
  Remaining strip (porch right to fence) = 662 - 628 = 34px = 1.2m ✓ VISIBLE

  terrace_top = 628, terrace_bottom = 628 + 84 = 712
  terrace_left = 124, terrace_right = 550 (same as house, 426px ≈ 15.2m)

  pool_left = 337 - 112 = 225

  paved_outer_right  = 449 + 56 = 505

  Gate in top fence:

  gate_left = 187-84=103, gate_right=187+84=271. Width=168px=6m ✓
  
  Parking label zone: x=54..320 (left of oak strip), y=82..362 (top area, no car symbol, just gate)
